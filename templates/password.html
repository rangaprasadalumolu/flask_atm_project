{% extends "welcome.html" %}

{% block title %}ATM PIN{% endblock %}

{% block content %}

<h2>Enter Your ATM PIN</h2>

<p>4 digit security PIN</p>

<form action="/pin" method="post">

<input
type="password"
name="password"
placeholder="Enter PIN"
maxlength="4"
pattern="[0-9]{4}"
required>

<br>

<button type="submit">Login</button>

</form>

<div class="error">
{{ pass_msg }}
</div>

{% endblock %}
