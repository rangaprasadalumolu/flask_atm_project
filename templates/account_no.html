{% extends "welcome.html" %}

{% block title %}Account Number{% endblock %}

{% block content %}

<h2>Enter Your Account Number</h2>

<p>Format: 1XXX XXXX XXXXXX</p>

<form action="/account" method="post">

<input
type="text"
name="account"
placeholder="1234 5678 123456"
maxlength="16"
required>

<br>

<button type="submit">Verify Account</button>

</form>

<div class="error">
{{ ac_no }}
</div>

{% endblock %}
